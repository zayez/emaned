<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>emaned — codename generator</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Draw a single evocative word from curated taxonomies — Intel, mountains, celestial, gemstones, Greek." />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@125,400;125,500;125,600;125,700;125,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      // Apply theme synchronously, before React mounts, to avoid a light-flash
      // for users whose OS prefers dark. Mirrors the priority order in useEmaned:
      // explicit localStorage choice > OS preference > light.
      (function () {
        try {
          var raw = localStorage.getItem('emaned:theme');
          var theme = null;
          if (raw) theme = JSON.parse(raw);
          if (theme !== 'light' && theme !== 'dark') {
            theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          /* ignore — fall back to default light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
